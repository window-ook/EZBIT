name: Production 배포 (Main)

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches:
      - prod

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: corepack으로 pnpm 활성화
        run: |
          corepack enable
          corepack prepare pnpm@10.14.0 --activate

      - name: pnpm 캐시 설정
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 의존성 설치
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: 타입 체크
        working-directory: ./frontend
        run: npx tsc --noEmit
        continue-on-error: true

      - name: 린트 검사
        working-directory: ./frontend
        run: pnpm run lint
        continue-on-error: true

      - name: Vercel CLI 설치
        run: npm install --global vercel@latest

      - name: Vercel 환경 설정 (Production)
        working-directory: ./frontend
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Vercel 빌드
        working-directory: ./frontend
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Vercel Production 배포
        id: deploy
        working-directory: ./frontend
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "PRODUCTION_URL=$url" >> $GITHUB_OUTPUT
          echo "🚀 Production 배포 완료: $url"

      - name: 배포 성공 알림
        run: |
          echo "✅ Production 환경에 성공적으로 배포되었습니다!"
          echo "🌐 URL: ${{ steps.deploy.outputs.PRODUCTION_URL }}"
