name: E2E 테스트 (Preview 배포 후)

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  # Preview 워크플로우와 동일한 트리거 조건
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop
  
  # 수동 실행도 가능하도록
  workflow_dispatch:
    inputs:
      preview_url:
        description: '테스트할 Preview URL'
        required: false
        type: string

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_UPBIT_API_URL: https://api.upbit.com/v1
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      EXCHANGE_RATE_API_KEY: ${{ secrets.EXCHANGE_RATE_API_KEY }}
    
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 환경 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: pnpm 설치
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: pnpm 캐시 설정
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 의존성 설치
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Express.js 서버 시작 (백그라운드)
        working-directory: ./backend
        run: |
          npm install
          PORT=4000 npm start &
          echo $! > backend_pid.txt
        env:
          NODE_ENV: test
          PORT: 4000

      - name: 백엔드 서버 준비 대기
        run: |
          echo "백엔드 서버 준비 대기 중..."
          for i in {1..30}; do
            if curl -f http://localhost:4000 >/dev/null 2>&1; then
              echo "✅ 백엔드 서버 준비 완료"
              break
            fi
            echo "백엔드 대기 중... ($i/30)"
            sleep 2
          done

      - name: Playwright 브라우저 설치
        working-directory: ./frontend
        run: npx playwright install --with-deps

      - name: E2E 테스트 실행
        working-directory: ./frontend
        run: pnpm run test:playwright
        env:
          CI: true
          BASE_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_UPBIT_API_URL: https://api.upbit.com/v1
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          EXCHANGE_RATE_API_KEY: ${{ secrets.EXCHANGE_RATE_API_KEY }}

      - name: 테스트 결과 업로드
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: 테스트 결과 코멘트 (PR)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ job.status }}' === 'success';
            const emoji = success ? '✅' : '❌';
            const status = success ? '통과' : '실패';
            
            const comment = `
            ## ${emoji} E2E 테스트 결과: ${status}
            
            **브랜치:** \`${{ github.ref_name }}\`
            **커밋:** \`${{ github.sha }}\`
            **실행 시간:** ${new Date().toLocaleString('ko-KR')}
            
            ${success ? '모든 E2E 테스트가 성공적으로 통과되었습니다! 🎉' : '일부 E2E 테스트가 실패했습니다. 테스트 결과를 확인해주세요.'}
            
            **테스트 리포트:** [Artifacts에서 확인](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: 테스트 성공 알림
        if: success()
        run: |
          echo "✅ E2E 테스트가 성공적으로 완료되었습니다!"
          echo "🧪 모든 시나리오가 정상적으로 작동합니다."

      - name: 테스트 실패 알림
        if: failure()
        run: |
          echo "❌ E2E 테스트 실행 중 오류가 발생했습니다."
          echo "📋 테스트 리포트를 확인하여 문제를 해결해주세요."

      - name: 서버 프로세스 정리
        if: always()
        run: |
          echo "서버 프로세스 정리 중..."
          # 백엔드 프로세스 정리
          if [ -f "./backend/backend_pid.txt" ]; then
            kill $(cat ./backend/backend_pid.txt) 2>/dev/null || true
            rm ./backend/backend_pid.txt
          fi
          # 포트 기반 정리 (Playwright가 프론트엔드 관리)
          lsof -ti:3000 | xargs kill -9 2>/dev/null || true
          lsof -ti:4000 | xargs kill -9 2>/dev/null || true
          echo "✅ 프로세스 정리 완료"