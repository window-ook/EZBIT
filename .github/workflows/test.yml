name: 테스트 실행

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: pnpm 설치
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: pnpm 캐시 설정
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: 타입 체크
        run: pnpm run type-check

      - name: 린트 검사
        run: pnpm run lint

      - name: 테스트 실행
        run: pnpm run test

      - name: 빌드 테스트
        run: pnpm run build

      - name: 테스트 결과 요약
        if: always()
        run: |
          echo "✅ 모든 테스트가 완료되었습니다!"
          echo "📊 타입 체크, 린트 검사, 유닛 테스트, 빌드 테스트 수행"