name: 프론트엔드 Preview 배포

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  Deploy-Preview:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 환경 설정
        uses: actions/setup-node@v4
        with:
          node-version: 24.2.0

      - name: corepack 활성화
        run: corepack enable

      - name: pnpm 설치
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
          run_install: false

      - name: pnpm 캐시 설정
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 의존성 설치
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: 타입 체크
        working-directory: ./frontend
        run: pnpm run type-check
        continue-on-error: true

      - name: 린트 검사
        working-directory: ./frontend
        run: pnpm run lint
        continue-on-error: true

      - name: Playwright 브라우저 설치
        working-directory: ./frontend
        run: pnpm exec playwright install --with-deps
        continue-on-error: true

      - name: 테스트 실행
        working-directory: ./frontend
        run: pnpm run test:playwright
        continue-on-error: true

      - name: Vercel CLI 설치
        run: npm install -g vercel@latest

      - name: Vercel 환경 정보 가져오기 (Preview)
        working-directory: ./frontend
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        shell: bash

      - name: 프로젝트 빌드
        working-directory: ./frontend
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        shell: bash

      - name: Vercel에 Preview 배포
        id: deploy
        working-directory: ./frontend
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "PREVIEW_URL=$url" >> $GITHUB_OUTPUT
          echo "🚀 Preview 배포 완료!"
          echo "Preview URL: $url"
        shell: bash

      - name: 배포 결과 PR 코멘트
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { PREVIEW_URL } = process.env;
            const comment = `
            ## 🚀 Preview 배포 완료!

            **Preview URL:** ${PREVIEW_URL}

            **배포 브랜치:** \`${{ github.ref_name }}\`
            **커밋:** \`${{ github.sha }}\`

            배포된 사이트에서 변경사항을 확인해보세요! ✨
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            })
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.PREVIEW_URL }}

      - name: 배포 성공 알림
        if: success()
        run: |
          echo "✅ Preview 환경에 성공적으로 배포되었습니다"
