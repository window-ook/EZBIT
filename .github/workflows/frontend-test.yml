name: 프론트엔드 테스트 자동화

on:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - 'frontend/**'
  workflow_dispatch: # 수동 실행 가능

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 환경 설정
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: corepack 활성화
        run: corepack enable

      - name: pnpm 설치
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
          run_install: false

      - name: pnpm 캐시 설정
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 의존성 설치
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: 타입 체크
        working-directory: ./frontend
        run: pnpm run type-check

      - name: 린트 검사
        working-directory: ./frontend
        run: pnpm run lint

      - name: Playwright 브라우저 설치
        working-directory: ./frontend
        run: pnpm exec playwright install --with-deps

      - name: E2E 테스트 실행
        working-directory: ./frontend
        run: pnpm run test:playwright

      - name: 테스트 리포트 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: 테스트 결과 PR 코멘트
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            let testStatus = '✅ 모든 테스트 통과';
            let testDetails = '';
            
            try {
              // Playwright 결과 확인 (존재한다면)
              if (fs.existsSync('frontend/playwright-report/index.html')) {
                testDetails = '\n📊 **테스트 리포트**: [Playwright Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})';
              }
            } catch (error) {
              testStatus = '❌ 테스트 실행 중 오류 발생';
              testDetails = `\n🚨 **오류**: ${error.message}`;
            }
            
            const comment = `
            ## 🧪 테스트 결과
            
            ${testStatus}
            
            **브랜치**: \`${{ github.ref_name }}\`
            **커밋**: \`${{ github.sha }}\`
            ${testDetails}
            
            ---
            *자동화된 테스트가 완료되었습니다.*
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });