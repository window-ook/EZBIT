name: 백엔드 Production 배포

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  Deploy-Production:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 환경 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: npm 캐시 설정
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: 의존성 설치
        run: npm ci

      - name: 코드 문법 검사 (선택사항)
        run: node -c server.js
        continue-on-error: true

      - name: Railway CLI 설치
        run: npm install -g @railway/cli

      - name: Railway에 Production 배포
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: railway deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: 배포 성공 알림
        if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "✅ Production 환경에 성공적으로 배포되었습니다"
          echo "🚀 Railway 서버가 업데이트되었습니다"