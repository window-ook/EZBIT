name: 프론트엔드 Production 배포 (빠른 배포)

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  Deploy-Production:
    name: Production 배포 - 빠른 배포
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 환경 설정
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: corepack 활성화
        run: corepack enable

      - name: pnpm 설치
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
          run_install: false

      - name: pnpm 캐시 설정
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: pnpm 스토어 경로 설정
        run: |
          pnpm config set store-dir ~/.pnpm-store
          pnpm config set verify-store-integrity false
        shell: bash

      - name: 의존성 설치
        working-directory: ./frontend
        run: |
          export PATH="/bin:/usr/bin:/usr/local/bin:$PATH"
          export SHELL=/bin/bash
          
          # 강제로 깨끗한 설치
          rm -rf node_modules/.cache
          pnpm install --frozen-lockfile --prefer-offline
        shell: bash
        env:
          SHELL: /bin/bash

      - name: Vercel CLI 설치 (안정 버전)
        run: |
          export PATH="/bin:/usr/bin:/usr/local/bin:$PATH"
          export SHELL=/bin/bash
          
          # 안정적인 Vercel CLI 버전 설치
          npm install -g vercel@32.7.2
          
          # 설치 확인
          vercel --version
          which vercel
        shell: bash
        env:
          SHELL: /bin/bash

      - name: shell 환경 확인 및 수정
        run: |
          echo "=== 현재 환경 확인 ==="
          echo "PATH: $PATH"
          echo "SHELL: $SHELL"
          echo "USER: $USER"
          echo "HOME: $HOME"
          
          echo "=== shell 실행파일 위치 확인 ==="
          which sh || echo "sh not found"
          which bash || echo "bash not found"
          ls -la /bin/sh || echo "/bin/sh not found"
          ls -la /bin/bash || echo "/bin/bash not found"
          ls -la /usr/bin/sh || echo "/usr/bin/sh not found"
          
          echo "=== sh 심볼릭 링크 생성 (필요시) ==="
          if [ ! -f /bin/sh ]; then
            sudo ln -sf /bin/bash /bin/sh
            echo "Created symlink: /bin/sh -> /bin/bash"
          fi
          
          echo "=== PATH에 필수 디렉토리 추가 ==="
          export PATH="/bin:/usr/bin:/usr/local/bin:$PATH"
          echo "Updated PATH: $PATH"
        shell: bash

      - name: Vercel 환경 정보 가져오기 (Production)
        working-directory: ./frontend
        run: |
          export PATH="/bin:/usr/bin:/usr/local/bin:$PATH"
          export SHELL=/bin/bash
          
          # Vercel CLI 환경 확인
          vercel --version
          
          # 환경 정보 가져오기 시도
          timeout 300 vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} || {
            echo "⚠️ Vercel pull 실패, Next.js 직접 빌드로 전환"
            exit 1
          }
        shell: bash
        env:
          SHELL: /bin/bash
        continue-on-error: true

      - name: 대안 방법 - Next.js 직접 빌드
        if: failure()
        working-directory: ./frontend
        run: |
          echo "🔄 Next.js 직접 빌드 방식으로 전환"
          
          # 환경 변수 파일 생성 (Vercel 환경 변수 대신)
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" > .env.production
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> .env.production
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env.production
          
          # Next.js 빌드 실행
          pnpm run build
        shell: bash

      - name: 프로젝트 빌드 (Vercel CLI)
        if: success()
        working-directory: ./frontend
        run: |
          export PATH="/bin:/usr/bin:/usr/local/bin:$PATH"
          export SHELL=/bin/bash
          
          # Vercel 빌드 시도 (타임아웃 설정)
          timeout 600 vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        shell: bash
        env:
          SHELL: /bin/bash

      - name: Vercel에 Production 배포
        working-directory: ./frontend
        run: |
          export PATH="/bin:/usr/bin:/usr/local/bin:$PATH"
          export SHELL=/bin/bash
          
          if [ -d ".vercel" ]; then
            echo "📦 Vercel 프리빌드로 배포"
            timeout 300 vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
          else
            echo "📦 직접 빌드된 파일로 배포"
            timeout 300 vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
          fi
        shell: bash
        env:
          SHELL: /bin/bash

      - name: 배포 성공 알림
        if: success()
        run: |
          echo "✅ Production 환경에 성공적으로 배포되었습니다"
