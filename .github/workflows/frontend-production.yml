name: 프론트엔드 Production 배포 (빠른 배포)

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  Deploy-Production:
    name: Production 배포 - 빠른 배포
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 환경 설정
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: corepack 활성화
        run: corepack enable

      - name: pnpm 설치
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
          run_install: false

      - name: pnpm 캐시 설정
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 의존성 설치
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile


      - name: Vercel CLI 설치
        run: npm install -g vercel@latest
        shell: bash

      - name: shell 환경 확인
        run: |
          echo "PATH: $PATH"
          echo "SHELL: $SHELL"
          which sh || echo "sh not found"
          which bash || echo "bash not found"
        shell: bash

      - name: Vercel 환경 정보 가져오기 (Production)
        working-directory: ./frontend
        run: |
          export SHELL=/bin/bash
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        shell: bash
        env:
          SHELL: /bin/bash

      - name: 프로젝트 빌드
        working-directory: ./frontend
        run: |
          export SHELL=/bin/bash
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        shell: bash
        env:
          SHELL: /bin/bash

      - name: Vercel에 Production 배포
        working-directory: ./frontend
        run: |
          export SHELL=/bin/bash
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        shell: bash
        env:
          SHELL: /bin/bash

      - name: 배포 성공 알림
        if: success()
        run: |
          echo "✅ Production 환경에 성공적으로 배포되었습니다"
