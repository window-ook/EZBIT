name: 프론트엔드 Production 배포 (빠른 배포)

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  Deploy-Production:
    name: Production 배포 - 빠른 배포
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 환경 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: corepack 활성화
        run: corepack enable

      - name: pnpm 설치
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
          run_install: false

      - name: pnpm 캐시 설정
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: pnpm 스토어 경로 설정
        run: |
          pnpm config set store-dir ~/.pnpm-store
          pnpm config set verify-store-integrity false
        shell: bash

      - name: 의존성 설치
        working-directory: ./frontend
        run: |
          export PATH="/bin:/usr/bin:/usr/local/bin:$PATH"
          export SHELL=/bin/bash
          
          # 강제로 깨끗한 설치
          rm -rf node_modules/.cache
          pnpm install --frozen-lockfile --prefer-offline
        shell: bash
        env:
          SHELL: /bin/bash

      - name: Vercel CLI 설치 (최신 버전)
        run: |
          export PATH="/bin:/usr/bin:/usr/local/bin:$PATH"
          export SHELL=/bin/bash
          
          # 최신 Vercel CLI 설치 (Node.js 20과 호환)
          npm install -g vercel@latest
          
          # 설치 확인
          vercel --version
          which vercel
        shell: bash
        env:
          SHELL: /bin/bash

      - name: shell 환경 강제 수정
        run: |
          echo "=== 시스템 환경 분석 ==="
          echo "OS: $(uname -a)"
          echo "PATH: $PATH"
          echo "SHELL: $SHELL"
          echo "USER: $USER"
          echo "HOME: $HOME"
          
          echo "=== shell 바이너리 위치 확인 ==="
          find /usr -name "sh" 2>/dev/null || echo "No sh in /usr"
          find /bin -name "sh" 2>/dev/null || echo "No sh in /bin"
          which sh || echo "sh not in PATH"
          which bash || echo "bash not in PATH"
          
          echo "=== 강제 shell 환경 구성 ==="
          # 다양한 위치에 sh 심볼릭 링크 생성
          sudo mkdir -p /bin /usr/bin
          
          if [ ! -f /bin/sh ]; then
            if [ -f /usr/bin/bash ]; then
              sudo ln -sf /usr/bin/bash /bin/sh
              echo "Created /bin/sh -> /usr/bin/bash"
            elif [ -f /bin/bash ]; then
              sudo ln -sf /bin/bash /bin/sh  
              echo "Created /bin/sh -> /bin/bash"
            fi
          fi
          
          if [ ! -f /usr/bin/sh ]; then
            if [ -f /usr/bin/bash ]; then
              sudo ln -sf /usr/bin/bash /usr/bin/sh
              echo "Created /usr/bin/sh -> /usr/bin/bash"
            elif [ -f /bin/bash ]; then
              sudo ln -sf /bin/bash /usr/bin/sh
              echo "Created /usr/bin/sh -> /bin/bash"  
            fi
          fi
          
          echo "=== PATH 완전 재구성 ==="
          export PATH="/bin:/usr/bin:/usr/local/bin:/sbin:/usr/sbin:$PATH"
          echo "New PATH: $PATH"
          
          echo "=== 최종 확인 ==="
          ls -la /bin/sh /usr/bin/sh 2>/dev/null || echo "Shell links still missing"
          which sh && echo "✅ sh found in PATH" || echo "❌ sh still not found"
        shell: bash

      - name: 환경 변수 설정
        working-directory: ./frontend
        run: |
          echo "🔧 환경 변수 파일 생성"
          
          # Production 환경 변수 생성
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" > .env.production
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> .env.production
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env.production
          
          # 환경 변수 확인 (값은 숨김)
          echo "✅ 환경 변수 파일 생성 완료"
          ls -la .env.production
        shell: bash

      - name: Next.js 직접 빌드
        working-directory: ./frontend
        run: |
          echo "🔨 Next.js 프로젝트 빌드 시작"
          
          # Next.js 빌드 실행
          pnpm run build
          
          echo "✅ Next.js 빌드 완료"
          ls -la .next/
        shell: bash

      - name: Vercel에 Production 배포 (직접 빌드)
        working-directory: ./frontend
        run: |
          # 강화된 환경 설정
          export PATH="/bin:/usr/bin:/usr/local/bin:/sbin:/usr/sbin:$PATH"
          export SHELL=/bin/bash
          export CONFIG_SHELL=/bin/bash
          
          echo "🚀 Vercel에 직접 빌드된 파일로 배포"
          echo "현재 PATH: $PATH"
          echo "SHELL: $SHELL"
          
          # shell 존재 확인
          ls -la /bin/sh || echo "⚠️ /bin/sh not found"
          which sh || echo "⚠️ sh not in PATH"
          
          # Vercel 직접 배포 (CLI build 과정 건너뛰기)
          # 환경 변수를 명시적으로 전달
          env PATH="$PATH" SHELL="$SHELL" CONFIG_SHELL="$SHELL" \
          timeout 300 vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        shell: bash
        env:
          SHELL: /bin/bash
          CONFIG_SHELL: /bin/bash

      - name: 배포 성공 알림
        if: success()
        run: |
          echo "✅ Production 환경에 성공적으로 배포되었습니다"
